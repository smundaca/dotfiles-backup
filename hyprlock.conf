background {
    monitor =
    path = /home/reyben/.config/hypr/Fondo/lock.jpg
    blur_passes = 0
    blur_size = 0
}

label {
    monitor =
    text = cmd[update:1000] echo "$(date +'%H:%M')"
    color = rgba(255,255,255,1.0)
    font_size = 90
    font_family = Sans
    position = 0, 180
    halign = center
    valign = center
}

label {
    monitor =
    text = cmd[update:60000] echo "$(date +'%A, %d de %B')"
    color = rgba(220,220,220,1.0)
    font_size = 24
    font_family = Sans
    position = 0, 110
    halign = center
    valign = center
}

input-field {
    monitor =
    size = 280, 50
    outline_thickness = 2
    dots_size = 0.2
    dots_spacing = 0.2
    dots_center = true
    outer_color = rgba(255,255,255,0.25)
    inner_color = rgba(20,20,20,0.45)
    font_color = rgba(255,255,255,1.0)
    fade_on_empty = false
    placeholder_text = <i>Contraseña...</i>
    hide_input = false
    position = 0, -40
    halign = center
    valign = center
}

label {
    monitor =
    text = $USER
    color = rgba(255,255,255,0.9)
    font_size = 22
    font_family = Sans
    position = 0, 25
    halign = center
    valign = center
}